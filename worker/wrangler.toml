name = "tk168-api"
main = "src/index.js"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
# Keep the default *.workers.dev URL enabled as a fallback access point so
# we can still reach the admin + API when local DNS cannot resolve the
# custom domain (api.tk168.co.jp).  Safe to leave on — both URLs serve the
# same Worker.
workers_dev = true

# Admin SPA + API served from the same worker via the ASSETS binding.  The
# static site (admin.html + supporting assets) is uploaded from the workspace
# root; the worker handles /api/* and falls through to ASSETS for everything
# else.
[assets]
directory = "../"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Custom domain: api.tk168.co.jp (tk168.co.jp zone is hosted on Cloudflare).
# Cloudflare provisions the TLS cert and the DNS record automatically.
[[routes]]
pattern = "api.tk168.co.jp"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "tk168"
database_id = "98fcc2a7-0461-41b7-9e01-238e9d78b3bc"

[[r2_buckets]]
binding = "R2"
bucket_name = "tk168-media"

[vars]
# Origins allowed to call the API with credentials.  Adjust here to add
# preview/staging domains later.  RFC1918 LAN http:// origins (10/8, 192.168/16, …)
# are also allowed in worker code for local static servers (see isPrivateLanHttpOrigin).
CORS_ALLOWED_ORIGINS = "https://www.tk168.co.jp,https://tk168.co.jp"
PUBLIC_MEDIA_BASE = ""
