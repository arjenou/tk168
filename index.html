<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム — TK168 Premium Automotive</title>
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" href="assets/images/logo_TK168.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://api.tk168.co.jp" crossorigin>
  <!-- R2 的 S3 端点 (…r2.cloudflarestorage.com/桶名) 一般不能直接匿名在浏览器中播放。公开读请用 Cloudflare
       「自定义域」或 r2.dev 公开桶，再设: window.TK168_MEDIA_BASE = "https://你的公开根"; -->
  <link rel="stylesheet" href="css/style.css?v=20260601d">
  <link rel="stylesheet" href="css/home-cube.css?v=20260430a">
</head>

<body class="is-home-landing" data-i18n-page-title="page.landingTitle">
  <div id="loading-screen">
    <div class="loading-screen__brand" aria-hidden="true">
      <img src="assets/images/logo_TK168.svg" alt="" width="160" height="160" decoding="async" fetchpriority="high">
    </div>
    <!-- 可选 data-src-mobile：窄屏用更小码率片头，上传后设与 R2 中路径一致即生效 -->
    <video id="intro-video" data-src="/api/media/videos/seed/intro-logo-trimmed.mp4" muted playsinline
      preload="auto"></video>
  </div>
  <!-- 顶栏在 #main 外，与其他页一致，且不受主内容区域布局影响；fixed 相对视口 -->
  <div data-layout-nav></div>
  <div id="main" class="hidden">

    <!-- ─ 第一页：Hero ─ -->
    <section id="hero">
      <div class="hero-video-wrap">
        <!-- 可选 data-src-mobile：手机用更低分辨率 hero（如 360p/480p 另存为 seed 下文件）以减轻首屏流量 -->
        <video id="hero-video" class="hero-media" data-src="https://api.tk168.co.jp/api/media/videos/seed/hero-main-web540.mp4" muted loop playsinline
          preload="metadata"></video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <p class="hero-eyebrow">TK168 PREMIUM AUTOMOTIVE</p>
          <h1 class="hero-title" data-i18n-html="hero.title">未来への道を探る</h1>
          <p class="hero-sub" data-i18n-html="hero.subtitle">安心感と効率を両立しながら、<br>理想の一台に出会うための上質な導線を整えます。</p>
          <a href="#brands" class="hero-cta-wrap">
            <span class="hero-cta">
              <span class="hero-cta-track" aria-hidden="true">
                <svg viewBox="0 0 220 56" preserveAspectRatio="none" focusable="false" aria-hidden="true">
                  <path id="hero-cta-track-path" class="hero-cta-track-path" d="M28 1.5H192A26.5 26.5 0 0 1 218.5 28A26.5 26.5 0 0 1 192 54.5H28A26.5 26.5 0 0 1 1.5 28A26.5 26.5 0 0 1 28 1.5Z"></path>
                  <path class="hero-cta-track-line" d="M28 1.5H192A26.5 26.5 0 0 1 218.5 28A26.5 26.5 0 0 1 192 54.5H28A26.5 26.5 0 0 1 1.5 28A26.5 26.5 0 0 1 28 1.5Z"></path>
                </svg>
              </span>
              <span class="hero-cta-label" data-i18n="hero.cta">ブランドを探索</span>
            </span>
            <span class="hero-cta-icon" aria-hidden="true">
              <span class="hero-cta-arrows">
                <svg class="hero-cta-chevron" viewBox="0 0 20 20">
                  <path d="M4 6l6 6 6-6"></path>
                </svg>
                <svg class="hero-cta-chevron" viewBox="0 0 20 20">
                  <path d="M4 6l6 6 6-6"></path>
                </svg>
                <svg class="hero-cta-chevron" viewBox="0 0 20 20">
                  <path d="M4 6l6 6 6-6"></path>
                </svg>
              </span>
            </span>
          </a>
        </div>
      </div>
    </section>
    <!-- ─ 第二页：品牌展示 ─ -->
    <section id="brands">
      <div class="lisboa-shell" data-carousel>
        <div class="lisboa-stage" data-stage></div>
        <div class="lisboa-gesture-layer" data-gesture aria-hidden="true"></div>
        <div class="lisboa-mobile-swipe-hint" data-swipe-hint aria-hidden="true">
          <span class="lisboa-mobile-swipe-hint__arrow">‹</span>
          <span class="lisboa-mobile-swipe-hint__text">左右滑动</span>
          <span class="lisboa-mobile-swipe-hint__arrow">›</span>
        </div>
        <div class="lisboa-bottom">
          <button class="lisboa-control lisboa-control--prev" type="button" data-nav="prev" aria-label="上一张">
            <span aria-hidden="true">←</span>
          </button>
          <div class="lisboa-thumbs" data-thumbs aria-label="品牌缩略图列表"></div>
          <button class="lisboa-control lisboa-control--next" type="button" data-nav="next" aria-label="下一张">
            <span aria-hidden="true">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ─ 第三页：车辆搜索展示 ─ -->
    <section id="vehicles" data-home-grid="paged">
      <div class="section-header light vehicles-header" style="height: 0; margin: 0; padding: 0; overflow: hidden;">
        <!-- v1.5 删除标题 -->
      </div>

      <!-- 统一搜索栏（静态版，与悬浮搜索条完全一致） -->
      <div class="search-bar-wrap" id="static-search">
        <div class="fb-desktop static-search-inner">
          <img src="assets/images/logo_TK168.svg" alt="TK168" class="fb-logo" loading="lazy" decoding="async">
          <div class="fb-filters">
            <button class="fb-filter" data-ui-field="makerModel">メーカー車名 <svg viewBox="0 0 10 6" fill="none">
                <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg></button>
            <button class="fb-filter" data-ui-field="price">価格 <svg viewBox="0 0 10 6" fill="none">
                <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg></button>
            <button class="fb-filter" data-ui-field="bodyStyle">ボディタイプ <svg viewBox="0 0 10 6" fill="none">
                <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg></button>
          </div>
          <div class="fb-input-wrap">
            <input type="text" class="fb-input" placeholder="例: フェラーリ 458" data-i18n-placeholder="search.placeholder">
            <button class="fb-cta" data-i18n="search.cta">検索する</button>
          </div>
        </div>
      </div>

      <div class="vehicle-grid" id="vehicleGrid"></div>
      <div class="vehicle-pagination" id="homeVehiclePagination">
        <button class="vehicle-slider-btn vehicle-slider-btn--prev" id="homeVehiclePrev" aria-label="前のページ">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <div class="vehicle-slider-dots" id="homeVehicleDots" aria-label="ページ送り"></div>
        <button class="vehicle-slider-btn vehicle-slider-btn--next" id="homeVehicleNext" aria-label="次のページ">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- ─ 第四页：企业新闻 ─ -->
    <section id="news">
      <div class="section-header light">
        <h2 data-i18n="home.newsTitle">最新情報</h2>
        <p data-i18n="home.newsSubtitle">マーケット情報 ・ 新規入庫 ・ ブランドトピックス</p>
      </div>
      <div class="news-grid" aria-live="polite"></div>
    </section>

    <!-- ─ 尾页：Footer ─ -->
    <div data-layout-footer></div>

  </div><!-- /main -->

  <div id="floating-bar">
    <!-- 桌面端 -->
    <div class="fb-desktop">
      <img src="assets/images/logo_TK168.svg" alt="TK168" class="fb-logo" loading="lazy" decoding="async">
      <div class="fb-filters">
        <button class="fb-filter" data-ui-field="makerModel">メーカー車名 <svg viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg></button>
        <button class="fb-filter" data-ui-field="price">価格 <svg viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg></button>
        <button class="fb-filter" data-ui-field="bodyStyle">ボディタイプ <svg viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg></button>
      </div>
      <div class="fb-input-wrap">
        <input type="text" class="fb-input" placeholder="例: フェラーリ 458" data-i18n-placeholder="search.placeholder">
        <button class="fb-cta" data-i18n="search.cta">検索する</button>
      </div>
    </div>
    <!-- 移动端 -->
    <div class="fb-mobile">
      <img src="assets/images/logo_TK168.svg" alt="TK168" class="fb-logo" loading="lazy" decoding="async">
      <button class="fb-cta" data-i18n="search.cta">検索する</button>
    </div>
  </div>

  <script src="js/layout-shell.js?v=20260419a"></script>
  <script src="js/brand-logo-inventory.js?v=20260417i"></script>
  <script src="js/brand-library-data.js?v=20260420c"></script>
  <script src="js/api-hydrate.js?v=20260428a"></script>
  <script src="js/admin-brand-key-options.js?v=20260425a"></script>
  <script src="js/brand-key-name-i18n.js?v=20260426a"></script>
  <script src="js/data.js?v=20260501b"></script>
  <script src="js/i18n.js?v=20260427d"></script>
  <script src="js/common-links.js?v=20260419a"></script>
  <script src="js/home-scroll-restore.js?v=20260425a"></script>
  <script src="js/page-chrome.js?v=20260601a"></script>
  <script src="js/renderers.js?v=20260501b"></script>
  <script src="js/search-ui.js?v=20260427d"></script>
  <script src="js/script.js?v=20260602b"></script>
  <script src="js/home-cube.js?v=20260430a"></script>
</body>

</html>
