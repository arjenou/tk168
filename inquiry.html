<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://api.tk168.co.jp" crossorigin>
  <title id="inqPageTitle">来店予約 — TK168 Premium Automotive</title>
  <link rel="stylesheet" href="css/style.css?v=20260527f">
  <link rel="stylesheet" href="css/skeleton.css?v=20260420h">
  <script src="js/skeleton-boot.js?v=20260420h"></script>
  <link rel="stylesheet" href="css/inquiry.css?v=20260622c">
</head>

<body class="inquiry-page no-hero-page">
  <div data-layout-nav></div>

  <main class="inq-main">
    <section class="inq-shell">
      <header class="inq-header">
        <button type="button" class="inq-back-btn" id="inqBackNavBtn" data-i18n-aria-label="detail.back">
          <svg class="inq-back-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
        <div class="inq-header-main">
          <p class="inq-eyebrow" id="inqEyebrow">TK168 CONTACT FLOW</p>
          <h1 class="inq-title" id="inqTitle">来店预约信息填写</h1>
          <p class="inq-subtitle" id="inqSubtitle">先在一页填完必要信息，再进入确认页核对后提交。</p>
        </div>
      </header>

      <div class="inq-board is-step-edit" id="inqBoard">
        <p class="inq-lead" id="inqLeadText" hidden></p>

        <article class="inq-vehicle">
          <img src="assets/images/placeholder.svg" alt="目标车辆" class="inq-vehicle-thumb" id="inqVehicleThumb">
          <div class="inq-vehicle-copy">
            <p class="inq-vehicle-brand" id="inqVehicleBrand">Lamborghini</p>
            <p class="inq-vehicle-name" id="inqVehicleName">Urus Performante</p>
            <p class="inq-vehicle-meta" id="inqVehicleMeta">2023 / 4.0L V8</p>
          </div>
        </article>

        <div class="inq-table">
          <section class="inq-row" data-row="appointment">
            <div class="inq-row-label">
              <span id="inqRowAppointment">来店希望时间</span>
              <b class="inq-required">必填</b>
            </div>
            <div class="inq-row-content">
              <div class="inq-row-summary">
                <span id="inqSummaryAppointment">未填写</span>
                <button type="button" class="inq-edit" data-jump-row="appointment" id="inqEditAppointment">修改</button>
              </div>
              <div class="inq-editor">
                <div class="inq-inline-grid">
                  <label>
                    <span id="inqDateLabel">日期</span>
                    <input type="date" id="inqDate">
                  </label>
                  <label>
                    <span id="inqTimeLabel">时间</span>
                    <select id="inqTime" data-time-slot-select>
                      <option value="" id="inqTimePlaceholder">请选择</option>
                    </select>
                  </label>
                </div>
                <label class="inq-textarea">
                  <span id="inqNoteLabel">备注（选填）</span>
                  <textarea id="inqNote" rows="3" placeholder="如有看车偏好、预算范围或其他说明，请在这里填写。"></textarea>
                </label>
              </div>
            </div>
          </section>

          <section class="inq-row" data-row="name">
            <div class="inq-row-label">
              <span id="inqRowName">姓名</span>
              <b class="inq-required">必填</b>
            </div>
            <div class="inq-row-content">
              <div class="inq-row-summary">
                <span id="inqSummaryName">未填写</span>
                <button type="button" class="inq-edit" data-jump-row="name" id="inqEditName">修改</button>
              </div>
              <div class="inq-editor">
                <label>
                  <span id="inqNameLabel">姓名</span>
                  <input type="text" id="inqName" placeholder="张三">
                </label>
              </div>
            </div>
          </section>

          <section class="inq-row" data-row="kana">
            <div class="inq-row-label">
              <span id="inqRowKana">姓名读音</span>
              <b class="inq-required">必填</b>
            </div>
            <div class="inq-row-content">
              <div class="inq-row-summary">
                <span id="inqSummaryKana">未填写</span>
                <button type="button" class="inq-edit" data-jump-row="kana" id="inqEditKana">修改</button>
              </div>
              <div class="inq-editor">
                <label>
                  <span id="inqKanaLabel">姓名读音</span>
                  <input type="text" id="inqKana" placeholder="チョウ サン">
                </label>
              </div>
            </div>
          </section>

          <section class="inq-row" data-row="contact">
            <div class="inq-row-label">
              <span id="inqRowContact">邮箱 / 电话</span>
              <b class="inq-required">必填</b>
            </div>
            <div class="inq-row-content">
              <div class="inq-row-summary">
                <span id="inqSummaryContact">未填写</span>
                <button type="button" class="inq-edit" data-jump-row="contact" id="inqEditContact">修改</button>
              </div>
              <div class="inq-editor">
                <div class="inq-inline-grid">
                  <label>
                    <span id="inqEmailLabel">邮箱地址</span>
                    <input type="email" id="inqEmail" placeholder="name@example.com">
                  </label>
                  <label>
                    <span id="inqPhoneLabel">电话号码</span>
                    <input type="tel" id="inqPhone" placeholder="09012345678">
                  </label>
                </div>
                <label class="inq-check">
                  <input type="checkbox" id="inqConsentNews">
                  <span id="inqConsentNewsLabel">接收新到库存和活动资讯</span>
                </label>
                <label class="inq-check">
                  <input type="checkbox" id="inqConsentPolicy">
                  <span class="inq-check-text" data-legal-consent-label>
                    <span data-legal-consent-prefix></span><a href="terms-of-use.html" class="inq-policy-link" data-legal-consent-terms target="_blank" rel="noopener noreferrer">利用規約</a><span data-legal-consent-middle">と</span><a href="privacy-policy.html" class="inq-policy-link" data-legal-consent-privacy target="_blank" rel="noopener noreferrer">プライバシーポリシー</a><span data-legal-consent-suffix">に同意する</span>
                  </span>
                </label>
              </div>
            </div>
          </section>
        </div>

        <div class="inq-footnote" id="inqFootnote">
          <p id="inqFootnoteLine1">ご希望の日時で承れない場合は、お電話にてご調整させていただく場合がございます。</p>
          <p id="inqFootnoteLine2">お客様からご提供頂いた個人情報は、お車の買取、販売など当社サービスのご案内（電話・メール等）及びご提供のために利用いたします。</p>
        </div>

        <div class="inq-actions">
          <div class="inq-submit-col">
            <button type="button" class="inq-btn inq-btn--primary" id="inqNextBtn">送信する</button>
            <p class="inq-message" id="inqMessage" aria-live="polite"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-layout-footer></div>

  <script defer src="js/layout-shell.js?v=20260621a"></script>
  <script defer src="js/brand-logo-inventory.js?v=20260417i"></script>
  <script defer src="js/api-hydrate.js?v=20260522e"></script>
  <script defer src="js/data.js?v=20260511s"></script>
  <script defer src="js/i18n.js?v=20260621b"></script>
  <script defer src="js/common-links.js?v=20260419a"></script>
  <script defer src="js/page-chrome.js?v=20260601a"></script>
  <script defer src="js/form-submit-mail.js?v=20260622a"></script>
  <script defer src="js/legal-consent-label.js?v=20260621a"></script>
  <script defer src="js/form-time-slots.js?v=20260621a"></script>
  <script defer src="js/inquiry.js?v=20260622a"></script>
</body>

</html>
