<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://api.tk168.co.jp" crossorigin>
  <title id="riqcPageTitle">レンタル相談の確認 — TK168 Premium Automotive</title>
  <link rel="stylesheet" href="css/style.css?v=20260709a">
  <link rel="stylesheet" href="css/skeleton.css?v=20260420h">
  <script src="js/skeleton-boot.js?v=20260420h"></script>
  <link rel="stylesheet" href="css/inquiry.css?v=20260620c">
  <link rel="stylesheet" href="css/rental-inquiry.css?v=20260526d">
  <link rel="stylesheet" href="css/rental-inquiry-confirm.css?v=20260620a">
</head>

<body class="inquiry-page rental-inquiry-page rental-inquiry-confirm-page no-hero-page">
  <div data-layout-nav></div>

  <main class="inq-main">
    <section class="inq-shell">
      <header class="inq-header">
        <button type="button" class="inq-back-btn" id="riqcBackNavBtn" data-i18n-aria-label="detail.back">
          <svg class="inq-back-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
        <div class="inq-header-main">
          <p class="inq-eyebrow" id="riqcEyebrow">TK168 RENTAL CONSULT</p>
          <h1 class="inq-title" id="riqcTitle">入力内容の確認</h1>
          <p class="inq-subtitle" id="riqcSubtitle" hidden></p>
        </div>
      </header>

      <div class="inq-board">
        <p class="inq-lead" id="riqcLeadText"></p>

        <article class="inq-vehicle riq-vehicle">
          <div class="riq-vehicle-gallery" id="riqcVehicleGallery">
            <button type="button" class="riq-gallery-nav riq-gallery-nav--prev" id="riqcGalleryPrev" aria-label="前の画像">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <div class="riq-gallery-viewport" id="riqcGalleryViewport">
              <div class="riq-gallery-track" id="riqcGalleryTrack" role="list"></div>
            </div>
            <button type="button" class="riq-gallery-nav riq-gallery-nav--next" id="riqcGalleryNext" aria-label="次の画像">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 18l6-6-6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
          <div class="inq-vehicle-copy">
            <p class="inq-vehicle-brand" id="riqcVehicleBrand"></p>
            <p class="inq-vehicle-name" id="riqcVehicleName"></p>
            <p class="inq-vehicle-meta" id="riqcVehicleMeta"></p>
            <div class="riq-metric-row">
              <article class="riq-metric">
                <span class="riq-metric-label" id="riqcRateLabel"></span>
                <strong class="riq-metric-value" id="riqcRateValue"></strong>
              </article>
              <article class="riq-metric">
                <span class="riq-metric-label" id="riqcDepositLabel"></span>
                <strong class="riq-metric-value" id="riqcDepositValue"></strong>
              </article>
              <article class="riq-metric">
                <span class="riq-metric-label" id="riqcMinDaysLabel"></span>
                <strong class="riq-metric-value" id="riqcMinDaysValue"></strong>
              </article>
            </div>
          </div>
        </article>

        <div id="riqcSummary" class="riqc-summary" aria-live="polite"></div>

        <div class="inq-actions">
          <div class="inq-submit-col">
            <button type="button" class="inq-btn inq-btn--primary" id="riqcSubmitBtn">送信</button>
            <p class="inq-message" id="riqcMessage" aria-live="polite"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-layout-footer></div>

  <script defer src="js/layout-shell.js?v=20260709b"></script>
  <script defer src="js/api-hydrate.js?v=20260522e"></script>
  <script defer src="js/data.js?v=20260511s"></script>
  <script defer src="js/i18n.js?v=20260621b"></script>
  <script defer src="js/common-links.js?v=20260419a"></script>
  <script defer src="js/page-chrome.js?v=20260601a"></script>
  <script defer src="js/form-submit-mail.js?v=20260621a"></script>
  <script defer src="js/rental-inquiry-confirm.js?v=20260621a"></script>
</body>

</html>
