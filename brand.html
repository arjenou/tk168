<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://api.tk168.co.jp" crossorigin>
  <title>厳選ブランド — TK168 Premium Automotive</title>
  <link rel="stylesheet" href="css/style.css?v=20260527f">
  <link rel="stylesheet" href="css/skeleton.css?v=20260420h">
  <script src="js/skeleton-boot.js?v=20260420h"></script>
  <link rel="stylesheet" href="css/brand.css?v=20260602c">
</head>

<body>
  <div data-layout-nav></div>
  <section id="brand-hero">
    <div class="bh-img-wrap">
      <img src="assets/images/brand-hero-usercrop.png?v=20260412d" alt="TK168 Brand Hero" class="bh-img" id="brandHeroImage">
      <div class="bh-overlay"></div>
    </div>
    <div class="bh-content">
      <h1 class="bh-title" id="brandHeroTitle">厳選ブランド</h1>
    </div>
  </section>

  <section id="brand-nav-section">
    <div class="bn-shell">
      <button class="bn-control bn-control--prev" id="bnPrev" type="button" aria-label="前のブランドグループ">
        <span aria-hidden="true">←</span>
      </button>
      <div class="bn-track" id="bnGrid" aria-label="ブランドナビゲーション"></div>
      <button class="bn-control bn-control--next" id="bnNext" type="button" aria-label="次のブランドグループ">
        <span aria-hidden="true">→</span>
      </button>
    </div>
  </section>

  <section id="vehicles" class="brand-vehicles">
    <div class="vehicle-grid" id="vehicleGrid"></div>

    <div class="brand-vehicle-load-more-wrap" id="brandVehicleLoadMoreWrap" hidden>
      <button type="button" class="brand-vehicle-load-more" id="brandVehicleLoadMore"></button>
    </div>
  </section>

  <div data-layout-footer></div>

  <script defer src="js/layout-shell.js?v=20260602a"></script>
  <script defer src="js/brand-logo-inventory.js?v=20260417i"></script>
  <script defer src="js/api-hydrate.js?v=20260522e"></script>
  <script defer src="js/admin-brand-key-options.js?v=20260425a"></script>
  <script defer src="js/brand-key-name-i18n.js?v=20260426a"></script>
  <script defer src="js/data.js?v=20260511h"></script>
  <script defer src="js/i18n.js?v=20260521a"></script>
  <script defer src="js/common-links.js?v=20260419a"></script>
  <script defer src="js/page-chrome.js?v=20260601a"></script>
  <script defer src="js/inventory-context.js?v=20260417i"></script>
  <script defer src="js/renderers.js?v=20260602a"></script>
  <script defer src="js/search-ui.js?v=20260509d"></script>
  <script defer src="js/brand.js?v=20260602b"></script>
</body>

</html>
