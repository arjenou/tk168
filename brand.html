<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>厳選ブランド — TK168 Premium Automotive</title>
  <link rel="stylesheet" href="css/style.css?v=20260512a">
  <link rel="stylesheet" href="css/skeleton.css?v=20260420h">
  <script src="js/skeleton-boot.js?v=20260420h"></script>
  <link rel="stylesheet" href="css/brand.css?v=20260508c">
</head>

<body>
  <div data-layout-nav></div>
  <section id="brand-hero">
    <div class="bh-img-wrap">
      <img src="assets/images/brand-hero-usercrop.png?v=20260412d" alt="TK168 Brand Hero" class="bh-img" id="brandHeroImage">
      <div class="bh-overlay"></div>
    </div>
    <div class="bh-content">
      <h1 class="bh-title" id="brandHeroTitle">厳選ブランド</h1>
    </div>
  </section>

  <section id="brand-nav-section">
    <div class="bn-shell">
      <button class="bn-control bn-control--prev" id="bnPrev" type="button" aria-label="前のブランドグループ">
        <span aria-hidden="true">←</span>
      </button>
      <div class="bn-track" id="bnGrid" aria-label="ブランドナビゲーション"></div>
      <button class="bn-control bn-control--next" id="bnNext" type="button" aria-label="次のブランドグループ">
        <span aria-hidden="true">→</span>
      </button>
    </div>
  </section>

  <section id="vehicles" class="brand-vehicles">
    <div class="vehicle-grid" id="vehicleGrid"></div>

    <!-- Pagination -->
    <div class="vehicle-pagination v-pagination" id="vPagination">
      <button class="vehicle-slider-btn vehicle-slider-btn--prev" id="vpnPrev" aria-label="前のページ">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="vehicle-slider-dots" id="vpnDots" aria-label="ページ送り"></div>
      <button class="vehicle-slider-btn vehicle-slider-btn--next" id="vpnNext" aria-label="次のページ">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </section>

  <div data-layout-footer></div>

  <script src="js/layout-shell.js?v=20260512a"></script>
  <script src="js/brand-logo-inventory.js?v=20260417i"></script>
  <script src="js/brand-library-data.js?v=20260420c"></script>
  <script src="js/api-hydrate.js?v=20260509b"></script>
  <script src="js/admin-brand-key-options.js?v=20260425a"></script>
  <script src="js/brand-key-name-i18n.js?v=20260426a"></script>
  <script src="js/data.js?v=20260511h"></script>
  <script src="js/i18n.js?v=20260510f"></script>
  <script src="js/common-links.js?v=20260419a"></script>
  <script src="js/page-chrome.js?v=20260601a"></script>
  <script src="js/inventory-context.js?v=20260417i"></script>
  <script src="js/renderers.js?v=20260511q"></script>
  <script src="js/search-ui.js?v=20260509d"></script>
  <script src="js/brand.js?v=20260511q"></script>
</body>

</html>
