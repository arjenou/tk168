<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://api.tk168.co.jp" crossorigin>
  <title>お気に入り — TK168 Premium Automotive</title>
  <link rel="stylesheet" href="css/style.css?v=20260527f">
  <link rel="stylesheet" href="css/skeleton.css?v=20260420h">
  <script src="js/skeleton-boot.js?v=20260420h"></script>
  <link rel="stylesheet" href="css/brand.css?v=20260417u">
</head>

<body class="favorites-page">
  <div data-layout-nav></div>
  <section id="brand-hero">
    <div class="bh-img-wrap">
      <img src="assets/images/chen003.jpg" alt="TK168 Brand Hero" class="bh-img" id="favoriteHeroImage">
      <div class="bh-overlay"></div>
    </div>
    <div class="bh-content">
      <h1 class="bh-title" data-i18n="favorite.title">お気に入り</h1>
    </div>
  </section>

  <section id="vehicles" class="brand-vehicles">
    <div class="favorite-actions">
      <button type="button" class="favorite-clear" id="favoriteClear" data-i18n="favorite.clear">お気に入りをクリア</button>
    </div>
    <div class="vehicle-grid" id="favoriteVehicleGrid"></div>

    <!-- Pagination -->
    <div class="vehicle-pagination v-pagination" id="favoritePagination">
      <button class="vehicle-slider-btn vehicle-slider-btn--prev" id="favPrev" aria-label="上一页">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="vehicle-slider-dots" id="favDots" aria-label="车辆翻页"></div>
      <button class="vehicle-slider-btn vehicle-slider-btn--next" id="favNext" aria-label="下一页">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </section>

  <div data-layout-footer></div>

  <script defer src="js/layout-shell.js?v=20260621a"></script>
  <script defer src="js/brand-logo-inventory.js?v=20260417i"></script>
  <script defer src="js/api-hydrate.js?v=20260522e"></script>
  <script defer src="js/data.js?v=20260511h"></script>
  <script defer src="js/i18n.js?v=20260621b"></script>
  <script defer src="js/common-links.js?v=20260419a"></script>
  <script defer src="js/page-chrome.js?v=20260601a"></script>
  <script defer src="js/renderers.js?v=20260626a"></script>
  <script defer src="js/favorites.js?v=20260511q"></script>
</body>

</html>
